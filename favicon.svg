<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- fond sombre -->
  <rect width="32" height="32" rx="6" fill="#0e0e0f"/>
  
  <!-- arêtes du graphe -->
  <line x1="16" y1="6"  x2="26" y2="20" stroke="#d4af5f" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="6"  x2="6"  y2="20" stroke="#d4af5f" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
